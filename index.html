    <!-- FIREBASE -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBiyx9qNhBgXknIsM3kmanksNsOKi4p090",
            authDomain: "liga-softbol-pega.firebaseapp.com",
            projectId: "liga-softbol-pega",
            storageBucket: "liga-softbol-pega.firebasestorage.app",
            messagingSenderId: "123479362384",
            appId: "1:123479362384:web:90521fca4eb4c5fa3e3a55",
            measurementId: "G-WKK22W19CT"
        };

        window.firebaseConfigGlobal = firebaseConfig;

        try {
            const app = initializeApp(firebaseConfig);
            window.db = getFirestore(app);
            window.storage = getStorage(app);
            window.auth = getAuth(app);
            signInAnonymously(window.auth).catch(err => console.warn("Auth Error:", err));
        } catch (e) { console.error("Firebase Error:", e); }

        window.handleUpload = async function(event) {
            event.preventDefault();
            const SHARED_PASSWORD = "SOFTBOL2025";
            if (!window.storage) { showToast("Error: Base de datos no conectada.", "error"); return; }
            const teamSelect = document.getElementById('teamSelect');
            const fileInput = document.getElementById('logoFile');
            const passwordInput = document.getElementById('teamPassword');
            const submitBtn = document.querySelector('#uploadForm button[type="submit"]');

            if (!teamSelect.value || !fileInput.files[0]) { showToast("Faltan datos.", "warning"); return; }
            if (passwordInput.value.trim().toUpperCase() !== SHARED_PASSWORD) { showToast("Contraseña incorrecta.", "error"); return; }
            const file = fileInput.files[0];
            
            const originalBtnText = submitBtn.innerHTML;
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Subiendo...`;
            if(typeof lucide !== 'undefined') lucide.createIcons();

            try {
                const fileName = `logos/${teamSelect.value.replace(/[^a-z0-9]/gi, '_')}_${Date.now()}`;
                const storageRef = ref(window.storage, fileName);
                const snapshot = await uploadBytes(storageRef, file);
                const downloadURL = await getDownloadURL(snapshot.ref);
                await addDoc(collection(window.db, "pending_logos"), { team: teamSelect.value, logoUrl: downloadURL, status: "pending", createdAt: serverTimestamp() });
                showToast("¡Logo enviado con éxito!", "success");
                document.getElementById('uploadModal').close();
                document.getElementById('uploadForm').reset();
            } catch (error) { showToast("Error al subir: " + error.message, "error"); } 
            finally { submitBtn.disabled = false; submitBtn.innerHTML = originalBtnText; if(typeof lucide !== 'undefined') lucide.createIcons(); }
        }
    </script>

                let text = await fetchWithCache(csvUrl, forceRefresh);
                let rows = parseCSV(text);
                const validMatches = rows.filter(r => r[0] && r[0].trim() !== "");
                const last5 = validMatches.slice(-5).reverse(); 
                let html = '';
                last5.forEach(match => {
                    const teamA = match[0]; const scoreA = match[1]; const scoreB = match[2]; const teamB = match[3];
                    html += `<div class="mlb-card bg-white p-4 md:p-5 rounded-xl min-w-[200px] w-[200px] border border-gray-100 flex flex-col items-center justify-center shadow-lg transform hover:-translate-y-1 transition duration-300 group"><div class="w-full text-center space-y-2 md:space-y-3"><div class="font-black text-slate-900 text-sm md:text-lg uppercase truncate tracking-wide" title="${teamA}">${teamA}</div><div class="bg-gray-50 rounded-lg py-1 px-4 md:py-2 md:px-6 border border-gray-200 inline-block shadow-sm group-hover:shadow-md transition"><span class="font-sport text-2xl md:text-4xl text-pega-gold tracking-widest leading-none drop-shadow-sm">${scoreA}-${scoreB}</span></div><div class="font-black text-slate-900 text-sm md:text-lg uppercase truncate tracking-wide" title="${teamB}">${teamB}</div></div></div>`;
                });
                scroller.innerHTML = last5.length === 0 ? `<div class="text-slate-400 text-xs italic p-2">Sin resultados recientes.</div>` : html;
            } catch (e) {
                console.error("Error loading results", e);
                scroller.innerHTML = `<div class="text-red-400 text-xs p-2">Error resultados.</div>`;
            }
        }

        // --- GLOBAL EXPORTS PARA ONCLICKS ---
        window.goHome = goHome;
        window.enterSection = enterSection;
        window.toggleMobileView = toggleMobileView;
        window.loadCurrentTab = loadCurrentTab;
        window.toggleGroupDropdown = toggleGroupDropdown;
        window.openTeamForm = openTeamForm;
        window.openTeamStats = openTeamStats;
        window.switchTab = switchTab;
        window.generateStaticAnalysis = generateStaticAnalysis;
        window.openUploadModal = openUploadModal;

        document.addEventListener('DOMContentLoaded', () => { refreshIcons(); goHome(); preloadLeaders(); });
    </script>
</body>
</html>
